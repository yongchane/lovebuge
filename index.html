<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>러브버그 클린업</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-card" aria-label="러브버그 클린업 게임">
        <header class="topbar">
          <div>
            <h1 class="eyebrow">LOVEBUG CLEANUP</h1>
          </div>
          <button
            id="soundToggle"
            class="icon-btn"
            type="button"
            aria-label="효과음 켜기"
          >
            <span id="soundIcon">♪</span>
          </button>
        </header>

        <section class="hud-grid" aria-label="게임 상태">
          <div class="hud-item">
            <span>Lv</span>
            <strong id="levelText">1</strong>
          </div>
          <div class="hud-item">
            <span>도구</span>
            <strong id="toolText">손</strong>
          </div>
          <div class="hud-item">
            <span>점수</span>
            <strong id="scoreText">0</strong>
          </div>
          <div class="hud-item">
            <span>콤보</span>
            <strong id="comboText">0</strong>
          </div>
          <div class="hud-item">
            <span>장소</span>
            <strong id="venueText">공원길</strong>
          </div>
          <div class="hud-item">
            <span>범위</span>
            <strong id="rangeText">32</strong>
          </div>
        </section>

        <section class="stage-wrap">
          <canvas
            id="gameCanvas"
            width="720"
            height="960"
            aria-label="러브버그 게임 화면"
          ></canvas>
          <div id="startPanel" class="overlay-panel">
            <div class="pixel-badge">60초 타임어택</div>
            <h2>몰려드는 러브버그를 톡톡 정리하세요</h2>
            <p>
              쌍으로 날아오고, 습한 풀밭과 흰 차량 주변에 더 자주 모여요. 많이
              잡을수록 도구가 업그레이드됩니다.
            </p>
            <button id="startButton" class="primary-btn" type="button">
              게임 시작
            </button>
          </div>
          <div id="resultPanel" class="overlay-panel hidden">
            <div class="pixel-badge">결과</div>
            <h2 id="resultTitle">클린업 완료</h2>
            <p id="resultSummary"></p>
            <button id="restartButton" class="primary-btn" type="button">
              다시 하기
            </button>
          </div>
        </section>

        <section class="bottom-panel">
          <div class="dock-status">
            <div>
              <div class="meter-label">
                <span>다음 레벨</span>
                <strong id="expText">0 / 80</strong>
              </div>
              <div class="meter"><span id="expBar"></span></div>
            </div>
            <div class="coin-pill">코인 <strong id="coinText">0</strong></div>
          </div>
          <div class="dock-tabs" aria-label="상점 탭">
            <button class="dock-tab active" type="button">스킬</button>
            <button class="dock-tab" type="button">도구</button>
            <button class="dock-tab" type="button">동료</button>
            <button class="dock-tab" type="button">장소</button>
          </div>
          <div class="dock-content">
            <button
              id="skillButton"
              class="skill-btn main-skill"
              type="button"
              disabled
            >
              <span id="skillName">스킬 대기</span>
              <strong id="skillCharge">잠김</strong>
            </button>
            <section class="shop-panel" aria-label="스킬 상점">
              <div class="shop-title">
                <span>스킬 상점</span>
                <strong>코인으로 구매</strong>
              </div>
              <div id="skillShop" class="shop-grid"></div>
            </section>
            <div class="future-slots" aria-label="추후 구매 슬롯">
              <button type="button">도구 강화</button>
              <button type="button">동료 슬롯</button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
